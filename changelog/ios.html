<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS 更新日志</title>
<style>
  :root {
    --bg: #1c1e28;
    --panel: rgba(33, 36, 49, 0.9);
    --text: #f7f2e8;
    --muted: #b8b2a5;
    --accent: #e5b778;
    --line: rgba(229, 183, 120, 0.22);
    --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    min-height: 100vh;
    font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(229, 183, 120, 0.16), transparent 24%),
      radial-gradient(circle at 85% 12%, rgba(86, 120, 255, 0.14), transparent 22%),
      linear-gradient(180deg, #171922 0%, #1c1e28 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at center, black 45%, transparent 95%);
    pointer-events: none;
  }

  .container {
    width: min(860px, calc(100% - 28px));
    margin: 0 auto;
    padding: 56px 0 72px;
  }

  h1 {
    font-size: clamp(2.3rem, 6vw, 3.6rem);
    letter-spacing: 0.04em;
  }

  .lead {
    max-width: 680px;
    margin-top: 14px;
    color: var(--muted);
    line-height: 1.8;
  }

  .timeline {
    position: relative;
    margin-top: 36px;
    padding-left: 28px;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(var(--accent), transparent);
  }

  .item {
    position: relative;
    margin-bottom: 22px;
  }

  .dot {
    position: absolute;
    left: -24px;
    top: 18px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 18px rgba(229, 183, 120, 0.45);
  }

  .card {
    padding: 22px 22px 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 22px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .meta {
    color: var(--accent);
    font-size: 0.92rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  ul {
    margin-top: 14px;
    padding-left: 18px;
    color: var(--muted);
    line-height: 1.8;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    margin-top: 12px;
    padding: 0 18px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--accent);
    background: rgba(229, 183, 120, 0.08);
    text-decoration: none;
  }

  @media (max-width: 640px) {
    .container {
      padding-top: 40px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="../index.html">返回下载中心</a>
    <h1>iOS What's New</h1>
    <p class="lead">这里记录 iPhone / iPad 安装入口与访问体验的更新。后续 iOS 相关能力调整、安装引导优化与兼容性增强都会持续同步。</p>

    <div class="timeline">
      <div class="item">
        <div class="dot"></div>
        <div class="card">
          <div class="meta">iOS Access Update · 2026-04-19</div>
          <ul>
            <li>新增 iOS 独立更新日志入口，便于集中查看版本变化。</li>
            <li>优化 iOS 安装入口展示，支持首页自动识别设备后优先推荐。</li>
            <li>补充海外 App Store 安装帮助链路，降低首次使用门槛。</li>
            <li>强化移动端访问体验与页面适配，入口切换更顺滑。</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
