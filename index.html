<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心</title>
    <meta name="apple-mobile-web-app-title" content="神灯永久链接">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./image/touch-icon-iphone.png">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>神灯VPN</h1>
            <p>专业品质，又快又好用!</p>
        </header>
        
        <section class="content">
            <h2>请选择您的设备下载</h2>
            <div class="download-buttons">
                <div class="download-item">
                    <a href="#" class="button" id="android-download">Android v3.2.0.apk</a>
                    <a href="./changelog/android.html" class="changelog-link">查看更新日志</a>
                </div>
                <a href="#" class="button" id="ios-web-download">iOS 网页版（建议优选海外AppStore下载）</a>
                <a href="#" class="button" id="ios-appstore-download">iOS 海外AppStore下载</a>
                <div class="download-item">
                    <a href="#" class="button" id="windows-download">Windows V4.3.0.exe</a>
                    <a href="./changelog/windows.html" class="changelog-link">查看更新日志</a>
                </div>
                <div class="download-item">
                    <a href="#" class="button" id="macos-download">macOS v3.5.0.pkg</a>
                    <a href="./changelog/macos.html" class="changelog-link">查看更新日志</a>
                </div>
            </div>
        </section>
    </div>
    <script>
        (function () {
            var platformTargets = {
                android: {
                    url: "https://github.com/shendeng88/sd/raw/main/file/shendeng-v4.0.0-31.apk",
                    version: "v4.0.0",
                    extension: "apk",
                    label: "Android"
                },
                windows: {
                    url: "https://github.com/shendeng88/sd/releases/download/shendeng-latest-exe/shendeng-V3.0.0-24.exe",
                    version: "V3.0.0",
                    extension: "exe",
                    label: "Windows"
                },
                macos: {
                    url: "https://github.com/shendeng88/sd/releases/download/shendeng-latest-pkg/shendeng-v2.3.0-71.pkg",
                    version: "v2.3.0",
                    extension: "pkg",
                    label: "macOS"
                },
                "ios-web": {
                    url: "web/index.html",
                    label: "iOS 网页版（建议优选海外AppStore下载）"
                },
                "ios-appstore": {
                    url: "help/index.html",
                    label: "iOS 海外AppStore下载"
                },
            };

            function applyDownloadTarget(elementId, targetKey) {
                var element = document.getElementById(elementId);
                var target = platformTargets[targetKey];

                if (!element || !target) {
                    return;
                }

                element.href = target.url;
                element.textContent = target.version
                    ? target.label + " " + target.version + "." + target.extension
                    : target.label;
            }

            applyDownloadTarget("android-download", "android");
            applyDownloadTarget("ios-web-download", "ios-web");
            applyDownloadTarget("ios-appstore-download", "ios-appstore");
            applyDownloadTarget("windows-download", "windows");
            applyDownloadTarget("macos-download", "macos");
        })();
    </script>
</body>
</html>
